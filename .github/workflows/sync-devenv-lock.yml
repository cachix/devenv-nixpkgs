# Workaround: pre-2.0 devenv versions require devenv.lock to be present in
# the rolling branch, so we keep it as a copy of flake.lock.
name: Sync devenv.lock

on:
  push:
    branches:
      - rolling
    paths:
      - flake.lock
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: rolling

      - name: Sync devenv.lock from flake.lock
        run: cp flake.lock devenv.lock

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: sync devenv.lock with flake.lock"
          file_pattern: devenv.lock
